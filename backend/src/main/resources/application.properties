spring.application.name=bespoke-backend

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/db_pbok?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson Configuration for snake_case JSON
spring.jackson.property-naming-strategy=SNAKE_CASE
